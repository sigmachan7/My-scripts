<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Unlocked! ✅</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-100 p-6 flex flex-col items-center font-sans min-h-screen">
    <h1 class="text-3xl font-black text-sky-600 mt-12 uppercase text-center">Script Unlocked! ✅</h1>
    
    <div class="bg-white p-6 rounded-3xl shadow-xl w-full max-w-sm mt-8 border-4 border-white">
        <p class="text-[10px] font-black text-sky-400 mb-2 uppercase tracking-widest">Steal A Brainrot Script:</p>
        
        <div id="codeBox" class="bg-sky-900 text-sky-200 p-4 rounded-2xl text-[11px] font-mono break-all mb-6 border border-sky-700 shadow-inner">
            loadstring(game:HttpGet("https://cdn.sourceb.in/bins/qiqlxejs9F/0"))()
        </div>

        <button onclick="copyScript(this)" class="w-full bg-sky-500 hover:bg-sky-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg transition-all active:scale-95">
            Copy Script 📋
        </button>
        
        <a href="index.html" class="block text-center mt-6 text-sky-400 text-xs font-bold hover:text-sky-600 uppercase">← Back to Home</a>
    </div>

    <script>
        function copyScript(btn) {
            const code = document.getElementById('codeBox').innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "COPIED! ✅";
            btn.style.background = "#059669";
            setTimeout(() => {
                btn.innerText = "COPY SCRIPT 📋";
                btn.style.background = "#0ea5e9";
            }, 2000);
        }
    </script>
</body>
</html>
