<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosty Scripts | Frosty Scripts</title>
    <style>
        /* Base Setup */
        body {
            margin: 0;
            padding: 20px;
            background-color: #add8e6; /* Light Blue Background */
            color: #1a1e26;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.2rem;
            color: #005f73;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            z-index: 10;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 450px;
            z-index: 10;
        }

        /* Script Section Box */
        .script-card {
            background: rgba(255, 255, 255, 0.9); /* Semi-transparent white */
            border: 2px solid #0072ff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .script-img {
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: #0072ff;
            margin: 5px 0;
        }

        /* The Code Box */
        .code-box {
            background: #1a1e26; /* Dark box for code contrast */
            color: #00ffcc;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            word-break: break-all;
            margin: 10px 0;
            text-align: left;
        }

        /* Copy Button */
        .copy-btn {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 114, 255, 0.3);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        /* --- FAST RANDOM SNOW --- */
        .snowflake {
            color: #fff;
            font-size: 1.5em;
            position: fixed;
            top: -10%;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0); }
            100% { top: 110%; transform: translateX(80px); }
        }

        .snowflake:nth-of-type(1) { left: 10%; animation-duration: 3s; }
        .snowflake:nth-of-type(2) { left: 30%; animation-duration: 4s; }
        .snowflake:nth-of-type(3) { left: 50%; animation-duration: 3.5s; }
        .snowflake:nth-of-type(4) { left: 70%; animation-duration: 4.5s; }
        .snowflake:nth-of-type(5) { left: 90%; animation-duration: 3.2s; }
    </style>
</head>
<body>

    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>

    <h1>Frosty Scripts</h1>

    <div class="container">
        
        <div class="script-card">
            <img src="https://raw.githubusercontent.com/sigmachan7/Sab/refs/heads/main/noFilter.webp" class="script-img" alt="Steal a Brainrot">
            <h2>Steal a Brainrot</h2>
            <div class="code-box" id="code1">loadstring(game:HttpGet("https://cdn.sourceb.in/bins/qiqlxejs9F/0"))()</div>
            <button class="copy-btn" onclick="copyText('code1')">COPY SCRIPT</button>
        </div>

        <div class="script-card">
            <img src="https://raw.githubusercontent.com/sigmachan7/Sp/refs/heads/main/noFilter%20(1).webp" class="script-img" alt="Sailor Piece">
            <h2>[✨Moon] Sailor Piece</h2>
            <div class="code-box" id="code2">loadstring(game:HttpGet("https://cdn.sourceb.in/bins/wxmedUGduX/0"))()</div>
            <button class="copy-btn" onclick="copyText('code2')">COPY SCRIPT</button>
        </div>

    </div>

    <script>
        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied to clipboard!");
            });
        }
    </script>

</body>
</html>
