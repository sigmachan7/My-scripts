<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosty Scripts | Home</title>
    <style>
        /* Base Setup */
        body {
            margin: 0;
            padding: 20px;
            /* Light Blue Background */
            background-color: #add8e6; 
            color: #1a1e26; /* Darker text for contrast on light blue */
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: #005f73;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            z-index: 10;
        }

        /* Container for the Script Cards */
        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            align-items: center;
            z-index: 10;
        }

        /* Individual Script Card */
        .card {
            background: rgba(255, 255, 255, 0.85); /* Semi-white cards */
            border: 2px solid #0072ff;
            border-radius: 20px;
            padding: 15px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 1);
        }

        .card-img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        h2 {
            margin: 10px 0;
            font-size: 1.4rem;
            color: #0072ff;
        }

        p {
            color: #444;
            font-weight: 500;
        }

        /* Button Styling */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            padding: 14px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1rem;
            margin-top: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 114, 255, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* --- FAST RANDOM SNOW (Blue/Gray for Visibility) --- */
        .snowflake {
            color: #ffffff;
            font-size: 1.5em;
            position: fixed;
            top: -10%;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            text-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0); }
            100% { top: 110%; transform: translateX(100px); }
        }

        /* Randomized Snow Speeds */
        .snowflake:nth-of-type(1) { left: 5%;  animation-duration: 3s; }
        .snowflake:nth-of-type(2) { left: 20%; animation-duration: 4.5s; animation-delay: 1s; }
        .snowflake:nth-of-type(3) { left: 40%; animation-duration: 3.2s; animation-delay: 0.5s; }
        .snowflake:nth-of-type(4) { left: 60%; animation-duration: 5s; animation-delay: 2s; }
        .snowflake:nth-of-type(5) { left: 80%; animation-duration: 3.5s; animation-delay: 1.2s; }
        .snowflake:nth-of-type(6) { left: 95%; animation-duration: 4s; }
    </style>
</head>
<body>

    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>

    <h1>Frosty Scripts</h1>

    <div class="container">
        
        <div class="card">
            <img src="https://raw.githubusercontent.com/sigmachan7/Sab/refs/heads/main/noFilter.webp" class="card-img" alt="Main Script">
            <h2>Main Script</h2>
            <p>High performance script.</p>
            <a href="https://sub2unlock.io/nIMeB" class="btn">UNLOCK NOW</a>
        </div>

        <div class="card">
            <img src="https://raw.githubusercontent.com/sigmachan7/Sp/refs/heads/main/noFilter%20(1).webp" class="card-img" alt="Sailor Piece">
            <h2>Sailor Piece</h2>
            <p>Exclusive Sailor Piece script.</p>
            <a href="https://sub2unlock.io/nIMeB" class="btn">UNLOCK NOW</a>
        </div>

    </div>

</body>
</html>
