<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosty Scripts | Home</title>
    <style>
        /* Basic Setup */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Image Styling */
        .header-img {
            width: 85%;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 198, 255, 0.6);
            margin-bottom: 20px;
            z-index: 10;
        }

        /* The "Get Script" Button */
        .btn {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            padding: 18px 45px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.4rem;
            transition: 0.2s;
            box-shadow: 0 8px 15px rgba(0, 114, 255, 0.4);
            z-index: 10;
            border: none;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* --- FAST RANDOM SNOW ANIMATION --- */
        .snowflake {
            color: #fff;
            font-size: 1.5em;
            position: fixed;
            top: -10%;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0); }
            100% { top: 110%; transform: translateX(120px); } /* Drifts as it falls */
        }

        /* Randomizing Speeds and Starting Points */
        .snowflake:nth-of-type(1) { left: 5%;  animation-duration: 3s; animation-delay: 0s; }
        .snowflake:nth-of-type(2) { left: 15%; animation-duration: 4.5s; animation-delay: 1s; font-size: 0.8em; }
        .snowflake:nth-of-type(3) { left: 25%; animation-duration: 3.8s; animation-delay: 0.5s; }
        .snowflake:nth-of-type(4) { left: 40%; animation-duration: 5s; animation-delay: 2s; }
        .snowflake:nth-of-type(5) { left: 55%; animation-duration: 3.2s; animation-delay: 0.2s; }
        .snowflake:nth-of-type(6) { left: 70%; animation-duration: 4.2s; animation-delay: 1.5s; }
        .snowflake:nth-of-type(7) { left: 85%; animation-duration: 3.5s; animation-delay: 0.8s; }
        .snowflake:nth-of-type(8) { left: 95%; animation-duration: 4.8s; animation-delay: 2.5s; }
    </style>
</head>
<body>

    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>

    <img src="https://raw.githubusercontent.com/sigmachan7/Sab/refs/heads/main/noFilter.webp" class="header-img" alt="Frosty Logo">

    <h1>Frosty Scripts</h1>
    <p>Fast, Safe, and Cold.</p>

    <a href="https://sub2unlock.io/nIMeB" class="btn">GET SCRIPT NOW</a>

</body>
</html>
