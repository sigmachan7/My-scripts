<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROSTY SCRIPTS | HOME</title>
    <style>
        html { scroll-behavior: smooth; }

        :root {
            --bg-gradient: linear-gradient(125deg, #add8e6, #87ceeb, #0072ff);
            --text-main: #ffffff;
            --box-bg: rgba(255, 255, 255, 0.7);
            --box-text: #1a1e26;
            --accent: #0072ff;
            --glass-border: rgba(255, 255, 255, 0.3);
            --working-green: #28a745;
            --hacker-green: #00ff41;
        }

        /* DARK MODE FIX: CHANGES THE FULL BACKGROUND */
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(125deg, #0b0e14, #1a1e26, #000000);
            --box-bg: rgba(26, 30, 38, 0.8);
            --box-text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0 0 100px 0;
            color: var(--text-main); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; text-transform: uppercase; overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: var(--bg-gradient);
            background-size: 400% 400%; animation: aurora 15s ease infinite;
            transition: background 0.5s ease;
        }

        @keyframes aurora { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

        /* 18. PARALLAX EFFECT ON ELEMENTS */
        .parallax-target { transition: transform 0.1s ease-out; }

        .glass {
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            background: var(--box-bg); border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        /* 16. HACKER SCRAMBLE STYLE */
        .hacker-txt { color: var(--hacker-green); font-family: monospace; }

        /* 6. VERIFIED BADGE */
        .verified-tick {
            background: var(--accent); color: white; font-size: 0.5rem;
            padding: 2px 5px; border-radius: 4px; margin-left: 5px;
            vertical-align: middle; display: inline-flex; align-items: center;
        }

        .top-controls { position: fixed; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 100; }
        
        /* 1. SNOWFLAKE TOGGLE BUTTON */
        .control-btn {
            background: var(--box-bg); border: 2px solid var(--accent);
            border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }

        .header-section { width: 90%; max-width: 500px; text-align: left; margin-top: 85px; }
        .main-title { font-size: 2.3rem; font-weight: 900; margin: 5px 0; }
        
        .status-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; font-weight: 900; font-size: 0.7rem; color: var(--working-green); }
        .dot { height: 8px; width: 8px; background-color: var(--working-green); border-radius: 50%; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }

        .content-wrapper { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; }
        .box, .card { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .box:hover, .card:hover { transform: scale(1.03); }

        .snowflake { color: #ffffff; position: fixed; z-index: -1; pointer-events: none; font-size: 1.5em; top: -10%; animation: fall 5s linear infinite; }
        @keyframes fall { 0% { top: -10%; } 100% { top: 110%; } }
        
        /* HIDDEN CLASS FOR TOGGLE */
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    <div class="bg-animate"></div>
    <div id="snow-container"><div class="snowflake">❅</div></div>

    <div class="top-controls">
        <button id="theme-toggle" class="control-btn glass">☀️</button>
        <button id="snow-toggle" class="control-btn glass">❄️</button>
        <div class="glass" style="padding: 4px 10px; border-radius: 5px; font-size: 0.6rem; font-weight: 900;">STATUS: SECURE 🛡️</div>
    </div>

    <div class="header-section parallax-target">
        <img src="https://raw.githubusercontent.com/sigmachan7/Delta/refs/heads/main/Screenshot_2026-04-03-20-06-18-08_96b26121e545231a3c569311a54cda96.jpg" style="width: 85px; height: 85px; border-radius: 20px; border: 3px solid var(--accent); object-fit: cover;">
        <h1 class="main-title hacker-txt" id="scramble-title">FROSTY SCRIPTS</h1>
        <div style="font-size: 2.1rem; margin: 20px 0; font-weight: 900; text-align: center;">EXPERIENCE THE <span style="color:var(--accent);">NEXT LEVEL</span> OF SCRIPTING</div>
    </div>

    <div class="content-wrapper">
        <div style="width: 90%; max-width: 400px; margin-bottom: 10px; font-weight: 900;">| EXECUTORS</div>

        <a href="https://delta-executor.com" class="glass" style="display: flex; align-items: center; border-radius: 15px; padding: 15px; text-decoration: none; color: var(--box-text); width: 85%; max-width: 380px;">
            <img src="https://raw.githubusercontent.com/sigmachan7/Sab/refs/heads/main/images.jpeg" style="width: 60px; height: 60px; border-radius: 10px; margin-right: 15px; object-fit: cover;">
            <div>
                <span style="font-weight: 900; font-size: 1rem;">DELTA EXECUTOR <span class="verified-tick">VERIFIED ✓</span></span>
                <span style="font-size: 0.7rem; opacity: 0.7; font-weight: bold;">THE BEST MOBILE EXECUTOR👆</span>
            </div>
        </a>

        <div style="width: 90%; max-width: 400px; margin-top: 30px; margin-bottom: 10px; font-weight: 900;">| LATEST SCRIPTS</div>

        <div class="card glass" style="border-radius: 20px; padding: 20px; width: 85%; max-width: 350px; text-align: center; color: var(--box-text);">
            <div class="status-container"><span class="dot"></span> WORKING</div>
            <img src="https://raw.githubusercontent.com/sigmachan7/Sp/refs/heads/main/noFilter%20(1).webp" style="width: 100%; border-radius: 15px; margin-bottom: 15px; height: 180px; object-fit: cover;">
            <h2 style="color:var(--accent);">[🌙MOON UPDATE⚔️] SAILOR PIECE</h2>
            <a href="https://sub2unlock.io/nIMeB" style="display: inline-block; background: #ff0000; color: white; padding: 12px 35px; text-decoration: none; font-weight: 900; border-radius: 50px; margin-top: 10px;">SUB TO UNLOCK🔓</a>
        </div>

        <div class="card glass" style="border-radius: 20px; padding: 20px; width: 85%; max-width: 350px; text-align: center; color: var(--box-text);">
            <div class="status-container"><span class="dot"></span> WORKING</div>
            <img src="https://raw.githubusercontent.com/sigmachan7/Sab/refs/heads/main/noFilter.webp" style="width: 100%; border-radius: 15px; margin-bottom: 15px; height: 180px; object-fit: cover;">
            <h2 style="color:var(--accent);">STEAL A BRAINROT</h2>
            <a href="https://sub2unlock.io/nIMeB" style="display: inline-block; background: #ff0000; color: white; padding: 12px 35px; text-decoration: none; font-weight: 900; border-radius: 50px; margin-top: 10px;">SUB TO UNLOCK🔓</a>
        </div>
    </div>

    <script>
        // 16. HACKER SCRAMBLE LOGIC
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        let interval = null;
        const title = document.getElementById("scramble-title");

        function scramble() {
          let iteration = 0;
          clearInterval(interval);
          interval = setInterval(() => {
            title.innerText = title.innerText.split("").map((letter, index) => {
              if(index < iteration) return "FROSTY SCRIPTS"[index];
              return letters[Math.floor(Math.random() * 26)]
            }).join("");
            if(iteration >= 14) clearInterval(interval);
            iteration += 1 / 3;
          }, 30);
        }
        window.onload = scramble;

        // 1. SNOWFLAKE TOGGLE
        const snowToggle = document.getElementById('snow-toggle');
        const snowContainer = document.getElementById('snow-container');
        snowToggle.onclick = () => snowContainer.classList.toggle('hidden');

        // DARK MODE FIX
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.innerText = isDark ? '☀️' : '🌙';
        };

        // 18. SIMPLE PARALLAX
        window.addEventListener('mousemove', (e) => {
            const target = document.querySelector('.parallax-target');
            let x = (window.innerWidth / 2 - e.pageX) / 50;
            let y = (window.innerHeight / 2 - e.pageY) / 50;
            target.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>
</body>
</html>
