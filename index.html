<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROSTY SCRIPTS | HOME</title>
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --bg-color: #add8e6; 
            --text-main: #ffffff;
            --box-bg: #ffffff;
            --box-text: #1a1e26;
            --accent: #0072ff;
        }

        [data-theme="dark"] {
            --bg-color: #0b0e14; 
            --box-bg: #1a1e26;
            --box-text: #ffffff;
            --text-main: #ffffff;
        }

        /* BASE SETUP */
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-transform: uppercase;
            transition: background-color 0.5s ease;
        }

        /* --- TOP RIGHT CONTROLS --- */
        .top-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 100;
        }

        #theme-toggle {
            background: var(--box-bg);
            border: 2px solid var(--accent);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 0 10px rgba(0, 114, 255, 0.3);
        }

        .viewer-counter {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            font-size: 0.7rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .viewer-counter img {
            height: 14px;
            filter: brightness(1.2);
        }

        /* --- HEADER SECTION --- */
        .header-section {
            width: 95%;
            max-width: 500px;
            text-align: left;
            margin-bottom: 20px;
            z-index: 10;
        }

        .yt-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px; 
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 10px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            white-space: nowrap;
        }

        .blue-text { color: var(--accent); }

        .sub-title {
            font-size: 2.2rem; 
            margin: 25px 0;
            font-weight: 900;
            line-height: 1.1;
            text-align: center; 
            width: 100%;
        }

        .small-info {
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            font-weight: bold;
            opacity: 0.9;
        }

        /* --- CATEGORY BAR --- */
        .category-bar {
            display: flex;
            align-items: center;
            width: 95%;
            max-width: 440px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 900;
            font-size: 1.3rem;
        }

        .big-pipe {
            font-size: 2.5rem;
            margin-right: 12px;
            color: var(--accent);
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
            z-index: 10;
        }

        .box {
            display: flex;
            align-items: center;
            background: var(--box-bg);
            border-radius: 15px;
            padding: 12px;
            text-decoration: none;
            color: var(--box-text);
            border: 2px solid var(--accent);
            width: 90%;
            max-width: 400px;
            transition: transform 0.2s ease;
        }

        .box:active { transform: scale(0.98); }

        .box-img { width: 65px; height: 65px; border-radius: 10px; margin-right: 15px; object-fit: cover; }
        .box-title { font-weight: 900; font-size: 1.1rem; display: block; }
        .box-subtext { font-size: 0.8rem; color: #888; display: block; font-weight: bold; }

        /* --- STARS & SNOW --- */
        .snowflake, .star { color: #ffffff; position: fixed; top: -10%; z-index: 1; pointer-events: none; }
        .snowflake { font-size: 1.5em; animation: fall 4s linear infinite; }
        .star { font-size: 0.5em; display: none; position: fixed; }
        [data-theme="dark"] .star { display: block; animation: twinkle 2s infinite ease-in-out; }

        @keyframes fall { 0% { top: -10%; } 100% { top: 110%; } }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .snowflake:nth-of-type(1) { left: 10%; }
        .snowflake:nth-of-type(2) { left: 50%; animation-delay: 2s; }
        .star:nth-of-type(3) { top: 20%; left: 30%; }
        .star:nth-of-type(4) { top: 50%; left: 80%; }

    </style>
</head>
<body data-theme="light">

    <div class="snowflake">❅</div><div class="snowflake">❄</div>
    <div class="star">⭐</div><div class="star">⭐</div>

    <div class="top-controls">
        <button id="theme-toggle">☀️</button>
        <div class="viewer-counter">
            <span>TOTAL VIEWS:</span>
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fsigmachan7.github.io&count_bg=%230072FF&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=hits&edge_flat=true" alt="Views"/>
        </div>
    </div>

    <div class="header-section">
        <img src="https://raw.githubusercontent.com/sigmachan7/Delta/refs/heads/main/Screenshot_2026-04-03-20-06-18-08_96b26121e545231a3c569311a54cda96.jpg" class="yt-logo" alt="LOGO">
        <h1 class="main-title"><span class="blue-text">FROSTY</span> <span class="white-text">SCRIPTS</span></h1>
        
        <div class="sub-title">
            <span class="white-text">EXPERIENCE THE</span><br>
            <span class="blue-text">NEXT LEVEL</span> <span class="white-text">OF</span><br>
            <span class="white-text">SCRIPTING</span>
        </div>
        
        <p class="small-info">VERIFIED, SAFE-TO-USE AND COMPATABLE WITH ALL DEVICES</p>
    </div>

    <div class="container">
        <div class="category-bar">
            <span class="big-pipe">|</span> <span class="white-text">EXECUTORS DOWNLOAD LINKS</span>
        </div>

        <a href="https://wearedevs.net/exploits" class="box">
            <img src="https://raw.githubusercontent.com/sigmachan7/Delta/refs/heads/main/unnamed.png" class="box-img">
            <div>
                <span class="box-title">ALL-IN-ONE EXECUTOR WEBSITE📁</span>
                <span class="box-subtext">EVERY BEST EXECUTORS HERE👆</span>
            </div>
        </a>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            if (currentTheme === 'light') {
                body.setAttribute('data-theme', 'dark');
                toggleBtn.innerText = '🌙';
            } else {
                body.setAttribute('data-theme', 'light');
                toggleBtn.innerText = '☀️';
            }
        });
    </script>
</body>
</html>
