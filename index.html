<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROSTY SCRIPTS | HOME</title>
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --bg-color: #add8e6; 
            --text-main: #ffffff;
            --box-bg: #ffffff;
            --box-text: #1a1e26;
            --accent: #0072ff;
        }

        [data-theme="dark"] {
            --bg-color: #0b0e14; 
            --box-bg: #1a1e26;
            --box-text: #ffffff;
            --text-main: #ffffff;
        }

        /* BASE SETUP */
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-transform: uppercase;
            transition: background-color 0.5s ease;
        }

        /* --- TOP CONTROLS FIX --- */
        .top-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            z-index: 100;
        }

        #theme-toggle {
            background: var(--box-bg);
            border: 2px solid var(--accent);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* RELIABLE VIEWER COUNTER (No External Image) */
        .viewer-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 10px;
            border-radius: 6px;
            border-right: 3px solid var(--accent);
            font-size: 0.65rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .view-count-num { color: var(--accent); }

        /* --- HEADER --- */
        .header-section {
            width: 100%;
            max-width: 450px;
            text-align: left;
            margin-top: 20px;
            z-index: 10;
        }

        .yt-logo {
            width: 75px;
            height: 75px;
            border-radius: 18px; 
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 10px;
        }

        .main-title { font-size: 2rem; font-weight: 900; margin: 0; line-height: 1; }
        .blue-text { color: var(--accent); }

        .sub-title {
            font-size: 1.8rem; 
            margin: 20px 0;
            font-weight: 900;
            line-height: 1.1;
            text-align: center;
        }

        /* --- CATEGORY --- */
        .category-bar {
            display: flex;
            align-items: center;
            width: 95%;
            max-width: 400px;
            margin-top: 15px;
            margin-bottom: 10px;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .big-pipe { font-size: 2rem; margin-right: 10px; color: var(--accent); }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
            z-index: 10;
        }

        .box {
            display: flex;
            align-items: center;
            background: var(--box-bg);
            border-radius: 15px;
            padding: 12px;
            text-decoration: none;
            color: var(--box-text);
            border: 2px solid var(--accent);
            width: 90%;
            max-width: 380px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .box-img { width: 55px; height: 55px; border-radius: 10px; margin-right: 12px; object-fit: cover; }
        .box-title { font-weight: 900; font-size: 0.95rem; display: block; }
        .box-subtext { font-size: 0.75rem; color: #777; display: block; font-weight: bold; }

        /* --- SNOW & STARS --- */
        .snowflake, .star { color: #ffffff; position: fixed; z-index: 1; pointer-events: none; }
        .snowflake { font-size: 1.2em; top: -10%; animation: fall 6s linear infinite; }
        .star { font-size: 0.7em; opacity: 0; }
        [data-theme="dark"] .star { opacity: 1; animation: twinkle 3s infinite; }

        @keyframes fall { 0% { top: -10%; } 100% { top: 110%; } }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .snowflake:nth-of-type(1) { left: 20%; }
        .snowflake:nth-of-type(2) { left: 80%; animation-delay: 3s; }
    </style>
</head>
<body data-theme="light">

    <div class="snowflake">❅</div><div class="snowflake">❄</div>
    <div class="star" style="top:10%; left:10%;">⭐</div>
    <div class="star" style="top:40%; left:80%;">⭐</div>

    <div class="top-controls">
        <button id="theme-toggle">☀️</button>
        <div class="viewer-box">
            LIVE VIEWS: <span class="view-count-num" id="count">104</span>
        </div>
    </div>

    <div class="header-section">
        <img src="https://raw.githubusercontent.com/sigmachan7/Delta/refs/heads/main/Screenshot_2026-04-03-20-06-18-08_96b26121e545231a3c569311a54cda96.jpg" class="yt-logo" alt="LOGO">
        <h1 class="main-title"><span class="blue-text">FROSTY</span> <span class="white-text">SCRIPTS</span></h1>
        
        <div class="sub-title">
            <span class="white-text">EXPERIENCE THE</span><br>
            <span class="blue-text">NEXT LEVEL</span> <span class="white-text">OF</span><br>
            <span class="white-text">SCRIPTING</span>
        </div>
    </div>

    <div class="container">
        <div class="category-bar">
            <span class="big-pipe">|</span> <span class="white-text">EXECUTORS</span>
        </div>

        <a href="https://wearedevs.net/exploits" class="box">
            <img src="https://raw.githubusercontent.com/sigmachan7/Delta/refs/heads/main/unnamed.png" class="box-img">
            <div>
                <span class="box-title">ALL-IN-ONE EXECUTOR WEBSITE📁</span>
                <span class="box-subtext">EVERY BEST EXECUTORS HERE👆</span>
            </div>
        </a>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;
        const countEl = document.getElementById('count');

        // THEME TOGGLE
        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            if (currentTheme === 'light') {
                body.setAttribute('data-theme', 'dark');
                toggleBtn.innerText = '🌙';
            } else {
                body.setAttribute('data-theme', 'light');
                toggleBtn.innerText = '☀️';
            }
        });

        // FAKE LIVE COUNTER (Adds realism)
        setInterval(() => {
            let current = parseInt(countEl.innerText);
            // Randomly add or subtract slightly to look "Live"
            if (Math.random() > 0.7) {
                countEl.innerText = current + Math.floor(Math.random() * 3);
            }
        }, 5000);
    </script>
</body>
</html>
