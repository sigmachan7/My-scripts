<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosty Scripts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%); 
            color: #0c4a6e; 
            min-height: 100vh;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .frosty-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(8px); 
            border: 2px solid #ffffff; 
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(186, 230, 253, 0.5);
        }
        .btn-unlock {
            background: #0ea5e9;
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            transition: 0.3s;
        }
        .btn-unlock:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="p-6">

    <header class="text-center mt-12 mb-10">
        <h1 class="text-5xl font-black tracking-tight text-sky-600 uppercase">Frosty Scripts</h1>
        <p class="text-sky-800 font-bold mt-2 tracking-wide text-sm">Experience The Next Level</p>
    </header>

    <main class="w-full max-w-sm frosty-card p-6 text-center">
        <h2 class="text-2xl font-black mb-4 text-sky-900 uppercase">STEAL A BRAINROT</h2>
        
        <div class="rounded-2xl overflow-hidden mb-5 border-4 border-white shadow-sm">
            <img src="https://tr.rbxcdn.com/180DAY-923f6e1f0e4b4494a810f5a706692233/768/432/Image/Webp/Thumbnail" alt="Steal a Brainrot" class="w-full">
        </div>

        <div class="flex justify-center items-center gap-2 mb-4">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="font-black text-xs text-green-600 uppercase tracking-widest">Working</span>
        </div>

        <p class="text-sky-700 text-sm mb-8 font-semibold leading-relaxed">
            STEAL A BRAINROT script v1. Elite performance. <br>Guaranteed brainrots.
        </p>

        <a href="https://sub2unlock.io/rh8fS" class="block w-full btn-unlock py-4 rounded-2xl font-black text-lg uppercase tracking-wider mb-6">
            Unlock Script 🔒
        </a>

        <div class="border-t border-sky-100 pt-5">
            <p class="text-2xl italic font-black text-sky-300">Frosty <span class="text-sky-500 text-sm not-italic">v1.0</span></p>
        </div>
    </main>

    <footer class="mt-12 text-sky-400 text-[10px] font-bold uppercase tracking-[0.2em]">
        © Frosty Scripts 2026
    </footer>

</body>
</html>
