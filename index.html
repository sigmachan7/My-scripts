        /* --- SCRIPT CARDS --- */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #0072ff;
            border-radius: 20px;
            padding: 15px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            position: relative; /* Needed for the Working dot */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .card-img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        /* --- WORKING DOT --- */
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #28a745;
            border: 1px solid #28a745;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #28a745;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 5px #28a745;
        }

        h2 { margin: 5px 0; font-size: 1.4rem; color: #0072ff; }
        p { color: #444; font-weight: 500; margin: 5px 0; }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            padding: 12px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 10px;
        }

        /* --- SNOW --- */
        .snowflake {
            color: #ffffff; font-size: 1.5em; position: fixed; top: -10%; z-index: 1; pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -10%; transform: translateX(0); }
            100% { top: 110%; transform: translateX(100px); }
        }
        .snowflake:nth-of-type(1) { left: 5%; animation-duration: 3s; }
        .snowflake:nth-of-type(2) { left: 25%; animation-duration: 4s; }
        .snowflake:nth-of-type(3) { left: 45%; animation-duration: 3.5s; }
        .snowflake:nth-of-type(4) { left: 65%; animation-duration: 5s; }
        .snowflake:nth-of-type(5) { left: 85%; animation-duration: 3.2s; }
    </style>
