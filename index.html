<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROSTY SCRIPTS | HOME</title>
    <style>
        html { scroll-behavior: smooth; }

        :root {
            --bg-gradient: linear-gradient(125deg, #add8e6, #87ceeb, #0072ff);
            --text-main: #ffffff;
            --box-bg: rgba(255, 255, 255, 0.7);
            --box-text: #1a1e26;
            --accent: #0072ff;
            --frosty-blue: #00d4ff;
            --glass-border: rgba(255, 255, 255, 0.3);
            --working-green: #28a745;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(125deg, #0b0e14, #1a1e26, #000000);
            --box-bg: rgba(26, 30, 38, 0.8);
            --box-text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0 0 100px 0;
            color: var(--text-main); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; text-transform: uppercase; overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: var(--bg-gradient);
            background-size: 400% 400%; animation: aurora 15s ease infinite;
        }

        @keyframes aurora { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

        /* --- SNOWFLAKE QUANTITY & RANDOM PATH SYSTEM --- */
        #snow-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }

        .snowflake {
            position: absolute; top: -10%;
            color: white; font-size: 1.2em;
            user-select: none;
            animation: fall linear infinite, sideSway ease-in-out infinite;
        }

        @keyframes fall {
            0% { top: -10%; }
            100% { top: 110%; }
        <div class="card glass">
            <div class="status-container"><span class="dot"></span> WORKING</div>
            <img src="https://raw.githubusercontent.com/sigmachan7/Sab/refs/heads/main/noFilter.webp" class="card-img">
            <h2 style="color:var(--accent);">STEAL A BRAINROT</h2>
            <a href="https://sub2unlock.io/nIMeB" class="btn-red">SUB TO UNLOCK🔓</a>
        </div>
    </div>

    <script>
        // --- IMPROVED SNOW SYSTEM ---
        const snowContainer = document.getElementById('snow-container');
        const flakeCount = 50; // MORE SNOWFLAKES

        for (let i = 0; i < flakeCount; i++) {
            let flake = document.createElement('div');
            flake.className = 'snowflake';
            flake.innerHTML = ['❅', '❄', '❆'][Math.floor(Math.random() * 3)];
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.opacity = Math.random();
            flake.style.animationDuration = (Math.random() * 3 + 2) + 's, ' + (Math.random() * 2 + 1) + 's'; // FALL SPEED & SWAY SPEED
            flake.style.animationDelay = Math.random() * 5 + 's';
            snowContainer.appendChild(flake);
        }

        // HACKER SCRAMBLE
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const titleElement = document.getElementById("scramble-title");
        const originalText = "FROSTY SCRIPTS";

        function scramble() {
            let iteration = 0;
            const interval = setInterval(() => {
                titleElement.innerHTML = originalText.split("").map((letter, index) => {
                    if (index < iteration) {
                        return index < 6 
                            ? `<span class="frosty-text">${originalText[index]}</span>` 
                            : `<span class="scripts-text">${originalText[index]}</span>`;
                    }
                    return `<span style="color:#00ff41">${letters[Math.floor(Math.random() * 26)]}</span>`;
                }).join("");
                if (iteration >= originalText.length) clearInterval(interval);
                iteration += 1/3;
            }, 30);
        }
        window.onload = scramble;

        // CONTROLS
        document.getElementById('snow-toggle').onclick = () => snowContainer.classList.toggle('hidden');
        document.getElementById('theme-toggle').onclick = function() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            this.innerText = isDark ? '☀️' : '🌙';
        };

        // PARALLAX
        window.addEventListener('mousemove', (e) => {
            const header = document.getElementById('parallax-header');
            let x = (window.innerWidth / 2 - e.pageX) / 40;
            let y = (window.innerHeight / 2 - e.pageY) / 40;
            header.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>
</body>
</html>
