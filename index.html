        /* Base Setup */
        body {
            margin: 0;

        /* --- HEARTBEAT ANIMATION --- */
        @keyframes slowHeartbeat {

            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
            z-index: 10;
        }

        /* --- EXECUTOR BOX --- */
        .executor-box {
            display: flex;
            align-items: center;
            background: white;
            border: 2px solid #0072ff;
            border-radius: 15px;
            width: 90%;
            max-width: 380px;
            padding: 10px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            animation: slowHeartbeat 3s ease-in-out infinite;
        }

        .executor-img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
        }

        .executor-text {
            font-weight: bold;
            font-size: 1.2rem;
            color: #0072ff;
        }

        /* --- SCRIPT CARDS --- */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #0072ff;
            border-radius: 20px;
            padding: 15px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            animation: slowHeartbeat 3s ease-in-out infinite;
        }

        .card:nth-child(3) { animation-delay: 0.5s; }

        .card-img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        /* --- WORKING STATUS --- */
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #28a745;
            border: 1px solid #28a745;
        }

        .dot {
            height: 7px;
            width: 7px;
            background-color: #28a745;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 5px #28a745;
        }

        h2 { margin: 5px 0; font-size: 1.4rem; color: #0072ff; }
        p { color: #444; font-weight: 500; margin: 5px 0; }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            padding: 12px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 10px;
        }

        /* --- TRULY RANDOM SNOW --- */
        .snowflake {
            color: #ffffff;
            font-size: 1.2em;
            position: fixed;
            top: -10%;
            z-index: 1;
            pointer-events: none;
            user-select: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0); }
            100% { top: 110%; transform: translateX(var(--drift)); }
        }

        /* Diverse snowflake speeds and positions */
        .snowflake:nth-of-type(1) { left: 2%;  --drift: 50px;  animation-duration: 4s; animation-delay: 0s; }
        .snowflake:nth-of-type(2) { left: 12%; --drift: -40px; animation-duration: 6s; animation-delay: 2s; }
        .snowflake:nth-of-type(3) { left: 22%; --drift: 80px;  animation-duration: 5s; animation-delay: 1s; }
        .snowflake:nth-of-type(4) { left: 32%; --drift: -20px; animation-duration: 7s; animation-delay: 3s; }
        .snowflake:nth-of-type(5) { left: 42%; --drift: 60px;  animation-duration: 4.5s; animation-delay: 0.5s; }
        .snowflake:nth-of-type(6) { left: 52%; --drift: -80px; animation-duration: 6.5s; animation-delay: 4s; }
        .snowflake:nth-of-type(7) { left: 62%; --drift: 30px;  animation-duration: 5.5s; animation-delay: 1.5s; }
        .snowflake:nth-of-type(8) { left: 72%; --drift: 90px;  animation-duration: 4s; animation-delay: 2.5s; }
        .snowflake:nth-of-type(9) { left: 82%; --drift: -50px; animation-duration: 6s; animation-delay: 0.2s; }
        .snowflake:nth-of-type(10){ left: 92%; --drift: 40px;  animation-duration: 5s; animation-delay: 3.5s; }
        /* Extra flakes for the left side coverage */
        .snowflake:nth-of-type(11){ left: 7%;  --drift: 100px; animation-duration: 4.2s; animation-delay: 2.2s; }
        .snowflake:nth-of-type(12){ left: 18%; --drift: -60px; animation-duration: 5.8s; animation-delay: 0.8s; }
    </style>
