<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROSTY SCRIPTS | HOME</title>
    <style>
        html { scroll-behavior: smooth; }

        :root {
            --bg-gradient: linear-gradient(125deg, #add8e6, #87ceeb, #0072ff);
            --text-main: #ffffff;
            --box-bg: rgba(255, 255, 255, 0.7);
            --box-text: #1a1e26;
            --accent: #0072ff;
            --frosty-blue: #00d4ff;
            --glass-border: rgba(255, 255, 255, 0.3);
            --working-green: #28a745;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(125deg, #0b0e14, #1a1e26, #000000);
            --box-bg: rgba(26, 30, 38, 0.8);
            --box-text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0 0 100px 0;
            color: var(--text-main); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; text-transform: uppercase; overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: var(--bg-gradient);
            background-size: 400% 400%; animation: aurora 15s ease infinite;
        }

        @keyframes aurora { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

        /* --- SNOWFLAKE QUANTITY & RANDOM PATH SYSTEM --- */
        #snow-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }

        .snowflake {
            position: absolute; top: -10%;
            color: white; font-size: 1.2em;
            user-select: none;
            animation: fall linear infinite, sideSway ease-in-out infinite;
        }

        @keyframes fall {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        @keyframes sideSway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(30px); }
        }

        .glass {
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            background: var(--box-bg); border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .main-title { font-size: 2.3rem; font-weight: 900; margin: 5px 0; font-family: monospace; }
        .frosty-text { color: var(--frosty-blue); }
        .scripts-text { color: #ffffff; }
        .blue-pipe { color: var(--accent); font-weight: 900; font-size: 1.5rem; margin-right: 5px; }

        .top-controls { position: fixed; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 100; }
        .control-btn { background: var(--box-bg); border: 2px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }

        .header-section { width: 90%; max-width: 500px; text-align: left; margin-top: 85px; }
        
        .status-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; font-weight: 900; font-size: 0.7rem; color: var(--working-green); }
        .dot { height: 8px; width: 8px; background-color: var(--working-green); border-radius: 50%; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }

        .content-wrapper { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; }
        .box { display: flex; align-items: center; border-radius: 15px; padding: 15px; text-decoration: none; color: var(--box-text); width: 85%; max-width: 380px; transition: 0.3s; }
        .box:hover { transform: scale(1.03); }
        .box-img { width: 60px; height: 60px; border-radius: 10px; margin-right: 15px; object-fit: cover; }

        .card { border-radius: 20px; padding: 20px; width: 85%; max-width: 350px; text-align: center; color: var(--box-text); margin-bottom: 20px; transition: 0.3s; }
        .card:hover { transform: scale(1.03); }
        .card-img { width: 100%; border-radius: 15px; margin-bottom: 15px; height: 180px; object-fit: cover; }
        
        .btn-red { display: inline-block; background: #ff0000; color: white; padding: 12px 35px; text-decoration: none; font-weight: 900; border-radius: 50px; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    </div>

        <h1 class="main-title" id="scramble-title">
            <span class="frosty-text">FROSTY</span> <span class="scripts-text">SCRIPTS</span>
        </h1>
        <div style="font-size: 2.1rem; margin: 20px 0; font-weight: 900; text-align: center;">EXPERIENCE THE <span style="color:var(--accent);">NEXT LEVEL</span> OF SCRIPTING</div>
    </div>

    <div class="content-wrapper">
        <div style="width: 90%; max-width: 400px; margin-bottom: 10px; font-weight: 900;"><span class="blue-pipe">|</span> EXECUTORS</div>

                <span style="font-weight: 900; font-size: 1rem;">DELTA EXECUTOR</span>
                <span style="font-size: 0.7rem; opacity: 0.7; font-weight: bold;">THE BEST MOBILE EXECUTOR👆</span>
            </div>
        </a>

        <a href="https://wearedevs.net/exploits" class="box glass">
            <img src="https://raw.githubusercontent.com/sigmachan7/Delta/refs/heads/main/unnamed.png" class="box-img">
            <div>
                <span style="font-weight: 900; font-size: 1rem;">ALL-IN-ONE WEBSITE📁</span>
                <span style="font-size: 0.7rem; opacity: 0.7; font-weight: bold;">EVERY BEST EXECUTORS HERE👆</span>
            </div>
        </a>

        <div style="width: 90%; max-width: 400px; margin-top: 30px; margin-bottom: 10px; font-weight: 900;"><span class="blue-pipe">|</span> LATEST SCRIPTS</div>

        <div class="card glass">
            <div class="status-container"><span class="dot"></span> WORKING</div>
            <img src="https://raw.githubusercontent.com/sigmachan7/Sp/refs/heads/main/noFilter%20(1).webp" class="card-img">
            <h2 style="color:var(--accent);">[🌙MOON UPDATE⚔️] SAILOR PIECE</h2>
            <a href="https://sub2unlock.io/nIMeB" class="btn-red">SUB TO UNLOCK🔓</a>
        </div>

        <div class="card glass">
            <div class="status-container"><span class="dot"></span> WORKING</div>
            <img src="https://raw.githubusercontent.com/sigmachan7/Sab/refs/heads/main/noFilter.webp" class="card-img">

        </div>
    </div>

    <script>
        // --- IMPROVED SNOW SYSTEM ---
        const snowContainer = document.getElementById('snow-container');
        const flakeCount = 50; // MORE SNOWFLAKES

        for (let i = 0; i < flakeCount; i++) {
            let flake = document.createElement('div');
            flake.className = 'snowflake';
            flake.innerHTML = ['❅', '❄', '❆'][Math.floor(Math.random() * 3)];
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.opacity = Math.random();
            flake.style.animationDuration = (Math.random() * 3 + 2) + 's, ' + (Math.random() * 2 + 1) + 's'; // FALL SPEED & SWAY SPEED
            flake.style.animationDelay = Math.random() * 5 + 's';
            snowContainer.appendChild(flake);
        }

        // HACKER SCRAMBLE
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const titleElement = document.getElementById("scramble-title");
        const originalText = "FROSTY SCRIPTS";

        function scramble() {
            let iteration = 0;
            const interval = setInterval(() => {
                titleElement.innerHTML = originalText.split("").map((letter, index) => {
                    if (index < iteration) {
                        return index < 6 
                            ? `<span class="frosty-text">${originalText[index]}</span>` 
                            : `<span class="scripts-text">${originalText[index]}</span>`;
                    }
                    return `<span style="color:#00ff41">${letters[Math.floor(Math.random() * 26)]}</span>`;
                }).join("");
                if (iteration >= originalText.length) clearInterval(interval);
                iteration += 1/3;
            }, 30);
        }
        window.onload = scramble;

        // CONTROLS
        document.getElementById('snow-toggle').onclick = () => snowContainer.classList.toggle('hidden');
        document.getElementById('theme-toggle').onclick = function() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            this.innerText = isDark ? '☀️' : '🌙';
        };

        // PARALLAX
        window.addEventListener('mousemove', (e) => {
            const header = document.getElementById('parallax-header');
            let x = (window.innerWidth / 2 - e.pageX) / 40;
            let y = (window.innerHeight / 2 - e.pageY) / 40;
            header.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>

</html>
